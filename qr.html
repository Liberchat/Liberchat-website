<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liberchat - Android QR Code</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link rel="preconnect" href="https://fonts.bunny.net" crossorigin>
    <link href="https://fonts.bunny.net/css?family=inter:300,400,600,700,800,900&display=swap" rel="stylesheet">
    <style>
        .qr-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 80px; /* Space for navbar */
        }

        .qr-box {
            background: var(--card-background);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-card);
            text-align: center;
            max-width: 500px;
            width: 90%;
            backdrop-filter: blur(10px);
        }

        .qr-title {
            font-size: 2.2rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .qr-code img {
            max-width: 100%;
            height: auto;
            border: 8px solid white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .qr-instructions {
            margin: 2rem 0;
            line-height: 1.8;
            color: var(--text-color);
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--text-color);
            text-decoration: none;
            margin-top: 2rem;
            transition: var(--transition);
            font-weight: 500;
        }

        .back-button:hover {
            color: var(--primary-color);
            transform: translateX(-5px);
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-content">
            <a href="./" class="logo">
                <img src="assets/icon.png" alt="Liberchat Logo" class="logo-img">
                <span>Liberchat</span>
            </a>
            <button class="menu-toggle" aria-label="Toggle menu">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-links">
                <li><a href="./">Home</a></li>
                <li><a href="roadmap.html">Roadmap</a></li>
                <li><a href="releases.html">Android</a></li>
                <li><a href="releases-linux.html">Linux</a></li>
                <li><a href="releases-windows.html">Windows</a></li>
                <li><a href="releases-macos.html">MacOS</a></li>
                <li><a href="installation-apk.html">Installation</a></li>
                <li><a href="autohebergement.html">Hosting</a></li>
                <li><a href="docker.html">Docker</a></li>
                <li><a href="faq.html">FAQ</a></li>
            </ul>
        </div>
    </nav>

    <div class="qr-container">
        <div class="qr-box">
            <h1 class="qr-title">Download via QR</h1>
            <div class="qr-code">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://github.com/Liberchat/releases/download/beta-1.0.0/liberchat-1.0.0-beta-a-only.apk" alt="Download QR Code">
            </div>
            <div class="qr-instructions">
                <p>Scan this QR code with your phone to download the Liberchat Android application directly.</p>
            </div>
            <a href="releases.html" class="back-button">
                <i class="fas fa-arrow-left"></i> Back to Downloads
            </a>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Mise à jour de l'année
            const yearElements = document.querySelectorAll('.current-year');
            const currentYear = new Date().getFullYear();
            yearElements.forEach(el => {
                el.textContent = currentYear;
            });

            // Menu mobile
            const menuToggle = document.querySelector('.menu-toggle');
            const navLinks = document.querySelector('.nav-links');

            menuToggle.addEventListener('click', () => {
                navLinks.classList.toggle('active');
            });
        });
    </script>
</body>

</html>
